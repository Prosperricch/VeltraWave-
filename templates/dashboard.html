<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>VeltraWave — Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@600;700;800&family=Barlow:wght@300;400;500;600;700&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg-top:#f3f1f7;
    --bg-bottom:#d9cdf5;
    --ink:#151230;
    --deep-blue:#0e1f5c;
    --purple-1:#8f7bf0;
    --purple-2:#6a54e8;
    --glass-bg: rgba(255,255,255,0.38);
    --glass-border: rgba(255,255,255,0.75);
    --glass-shadow: 0 8px 32px rgba(90,70,150,0.18);
  }
  *{box-sizing:border-box;}
  html,body{ margin:0; padding:0; height:100%; background:var(--bg-bottom); }
  body{
    font-family:'Barlow', sans-serif;
    color:var(--ink);
    display:flex;
    justify-content:center;
    min-height:100vh;
  }
  .page{
    width:100%;
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:flex-start;
    background:linear-gradient(180deg, #efeaf9 0%, #ded2f5 100%);
    padding:0;
  }
  .phone{
    width:100%;
    max-width:430px;
    min-height:100vh;
    position:relative;
    overflow:hidden;
    background:
      radial-gradient(120% 60% at 50% 0%, var(--bg-top) 0%, var(--bg-top) 40%, transparent 70%),
      linear-gradient(180deg, var(--bg-top) 0%, #e7defa 55%, var(--bg-bottom) 100%);
    display:flex;
    flex-direction:column;
    padding-bottom:112px;
  }
  @media (min-width:900px){
    .page{ padding:48px 24px; align-items:center; }
    .phone{
      max-width:460px;
      min-height:820px;
      border-radius:32px;
      box-shadow:0 40px 90px rgba(60,40,110,0.28), 0 2px 0 rgba(255,255,255,0.6) inset;
    }
  }
  .grid-overlay{
    position:absolute; inset:0;
    background-image:
      linear-gradient(rgba(120,100,180,0.06) 1px, transparent 1px),
      linear-gradient(90deg, rgba(120,100,180,0.06) 1px, transparent 1px);
    background-size:38px 38px;
    -webkit-mask-image: radial-gradient(70% 55% at 50% 30%, #000 40%, transparent 90%);
            mask-image: radial-gradient(70% 55% at 50% 30%, #000 40%, transparent 90%);
    pointer-events:none;
  }

  /* ---------- TOP BAR ---------- */
  .topbar{
    position:relative; z-index:6;
    padding:20px 22px 0;
    display:flex; align-items:center; justify-content:space-between;
  }
  .mark{ font-family:'Barlow Condensed', sans-serif; font-size:18px; letter-spacing:0.02em; }
  .mark .light{ font-weight:500; color:var(--purple-2); }
  .mark .heavy{ font-weight:600; color:var(--deep-blue); opacity:0.85; }
  .guest-chip{
    display:flex; align-items:center; gap:8px;
    padding:7px 14px 7px 8px;
    border-radius:40px;
    background:var(--glass-bg);
    border:1px solid var(--glass-border);
    box-shadow:var(--glass-shadow), inset 0 1px 1px rgba(255,255,255,0.9);
    backdrop-filter:blur(18px) saturate(180%);
    -webkit-backdrop-filter:blur(18px) saturate(180%);
    font-size:12.5px; font-weight:600;
  }
  .guest-chip .dot{
    width:24px; height:24px; border-radius:50%;
    background:linear-gradient(135deg, var(--purple-1), var(--purple-2));
    display:flex; align-items:center; justify-content:center;
    color:#fff; font-size:11px; font-weight:700;
  }

  /* ---------- GREETING ---------- */
  .greeting{
    position:relative; z-index:5;
    padding:24px 22px 4px;
  }
  .greeting h1{
    font-family:'Barlow Condensed', sans-serif;
    font-weight:800;
    font-size:30px;
    margin:0 0 4px 0;
    letter-spacing:-0.01em;
  }
  .greeting p{
    margin:0;
    font-size:14px;
    color:rgba(21,18,48,0.6);
  }

  /* ---------- SERVICES GRID (main selection) ---------- */
  .svc-section{
    position:relative; z-index:5;
    padding:30px 22px 4px;
    flex:1;
  }
  .svc-section h2{
    font-family:'Barlow Condensed', sans-serif;
    font-weight:800; font-size:22px;
    margin:0 0 14px 0;
  }
  .svc-grid{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:14px;
  }
  .svc-tile{
    position:relative;
    display:flex; flex-direction:column; gap:10px;
    padding:18px;
    border-radius:20px;
    text-decoration:none;
    color:var(--ink);
    background:var(--glass-bg);
    border:1px solid var(--glass-border);
    box-shadow:var(--glass-shadow), inset 0 1px 1px rgba(255,255,255,0.9);
    backdrop-filter:blur(18px) saturate(180%);
    -webkit-backdrop-filter:blur(18px) saturate(180%);
    transition:transform 160ms ease;
  }
  .svc-tile:active{ transform:scale(0.96); }
  .svc-tile .svc-icon{
    width:44px; height:44px; border-radius:13px;
    display:flex; align-items:center; justify-content:center;
    background:linear-gradient(135deg, var(--purple-1), var(--purple-2));
    box-shadow:0 6px 14px rgba(90,60,200,0.35);
  }
  .svc-tile .svc-icon svg{ width:22px; height:22px; }
  .svc-tile h3{ margin:0; font-size:16px; font-weight:700; }
  .svc-tile p{ margin:0; font-size:12px; line-height:1.4; color:rgba(21,18,48,0.6); }

  /* ---------- BOTTOM DOCK (cards, each -> a page) ---------- */
  .dock-wrap{
    position:fixed;
    left:50%;
    bottom:16px;
    transform:translateX(-50%);
    width:calc(100% - 32px);
    max-width:398px;
    z-index:50;
  }
  .dock{
    display:flex;
    gap:8px;
    padding:10px;
    border-radius:24px;
    background:var(--glass-bg);
    border:1px solid var(--glass-border);
    box-shadow:0 18px 40px -12px rgba(60,40,110,0.4), inset 0 1px 1px rgba(255,255,255,0.9);
    backdrop-filter:blur(22px) saturate(180%);
    -webkit-backdrop-filter:blur(22px) saturate(180%);
  }
  .dock-item{
    flex:1;
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:5px;
    padding:9px 4px 8px;
    border-radius:16px;
    text-decoration:none;
    color:rgba(21,18,48,0.55);
    transition:transform 160ms ease, background 160ms ease, color 160ms ease;
  }
  .dock-item .d-icon{
    width:26px; height:26px;
    display:flex; align-items:center; justify-content:center;
  }
  .dock-item .d-icon svg{ width:20px; height:20px; }
  .dock-item span.d-label{
    font-size:10px; font-weight:600; letter-spacing:0.01em;
  }
  .dock-item.active{
    background:linear-gradient(135deg, var(--purple-1), var(--purple-2));
    color:#fff;
    transform:translateY(-6px);
    box-shadow:0 10px 20px -6px rgba(90,60,220,0.55);
  }
  .dock-item:active{ transform:scale(0.94); }
</style>
</head>
<body>

<div class="page">
<div class="phone">
  <div class="grid-overlay"></div>

  <div class="topbar">
    <div class="mark"><span class="light">Veltra</span><span class="heavy">Wave</span></div>
    <div class="guest-chip">
      <span class="dot">G</span>
      <span>Guest</span>
    </div>
  </div>

  <section class="greeting">
    <h1>Hi there 👋</h1>
    <p>What would you like to get done today?</p>
  </section>

  <section class="svc-section">
    <h2>Choose a Service</h2>
    <div class="svc-grid">

      <a href="{{ url_for('data_page') }}" class="svc-tile">
        <div class="svc-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2a15 15 0 0 1 0 20"/><path d="M12 2a15 15 0 0 0 0 20"/><path d="M2 12h20"/><circle cx="12" cy="12" r="10"/></svg>
        </div>
        <h3>Data</h3>
        <p>Buy data plans on any network</p>
      </a>

      <a href="{{ url_for('airtime_page') }}" class="svc-tile">
        <div class="svc-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="6" y="2" width="12" height="20" rx="2"/><path d="M9 6h6M9 10h6"/><circle cx="12" cy="17" r="1.2" fill="#fff" stroke="none"/></svg>
        </div>
        <h3>Airtime</h3>
        <p>Instant top-up, all networks</p>
      </a>

      <a href="{{ url_for('bots') }}" class="svc-tile">
        <div class="svc-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="8" cy="9" r="3"/><circle cx="17" cy="14" r="2.5"/><path d="M3.5 19c.6-2.4 2.4-4 4.5-4s3.9 1.6 4.5 4"/></svg>
        </div>
        <h3>Bots</h3>
        <p>Social management bots</p>
      </a>

      <a href="{{ url_for('website') }}" class="svc-tile">
        <div class="svc-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="16" rx="2"/><path d="M3 9h18"/><circle cx="6.5" cy="6.5" r="0.6" fill="#fff" stroke="none"/><circle cx="9" cy="6.5" r="0.6" fill="#fff" stroke="none"/></svg>
        </div>
        <h3>Website</h3>
        <p>Request a custom build</p>
      </a>

    </div>
  </section>

</div>
</div>

<div class="dock-wrap">
  <nav class="dock">
    <a href="{{ url_for('data_page') }}" class="dock-item">
      <span class="d-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2a15 15 0 0 1 0 20"/><path d="M12 2a15 15 0 0 0 0 20"/><path d="M2 12h20"/><circle cx="12" cy="12" r="10"/></svg></span>
      <span class="d-label">Data</span>
    </a>
    <a href="{{ url_for('airtime_page') }}" class="dock-item">
      <span class="d-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="6" y="2" width="12" height="20" rx="2"/><path d="M9 6h6M9 10h6"/></svg></span>
      <span class="d-label">Airtime</span>
    </a>
    <a href="{{ url_for('website') }}" class="dock-item">
      <span class="d-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="16" rx="2"/><path d="M3 9h18"/></svg></span>
      <span class="d-label">Website</span>
    </a>
    <a href="{{ url_for('bots') }}" class="dock-item">
      <span class="d-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="8" cy="9" r="3"/><circle cx="17" cy="14" r="2.5"/><path d="M3.5 19c.6-2.4 2.4-4 4.5-4s3.9 1.6 4.5 4"/></svg></span>
      <span class="d-label">Bots</span>
    </a>
  </nav>
</div>

</body>
</html>
